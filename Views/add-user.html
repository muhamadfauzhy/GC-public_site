<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Add Staff</title>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6">Add Staff</h2>
        <form class="space-y-5">

            <!-- Email -->
            <div>
                <label class="block text-sm mb-1">
                    Email <span class="text-red-500">*</span>
                </label>
                <input 
                    type="email" 
                    placeholder="Masukkan email"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm mb-1">
                    Password <span class="text-red-500">*</span>
                </label>
                <input 
                    type="password" 
                    placeholder="Masukkan password"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-sm mb-1">Phone Number</label>
                <input 
                    type="text" 
                    placeholder="Masukkan nomor (optional)"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
            </div>

            <!-- Address -->
            <div>
                <label class="block text-sm mb-1">Address</label>
                <textarea 
                    placeholder="Masukkan alamat (optional)"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"></textarea>
            </div>

            <!-- Button -->
            <button 
                type="submit"
                class="w-full bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600 transition font-semibold tracking-wide">
                Add Staff
            </button>

        </form>

    </div>

</body>
</html>
