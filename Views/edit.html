<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Create Menu</title>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-6 bg-white shadow">
        <div class="flex space-x-6 text-sm tracking-widest">
            <h1 class="font-semibold">EDIT MENU</h1>
        </div>

        <div class="absolute left-1/2 transform -translate-x-1/2">
            <img src="../asset/Logo2.png" alt="logo" class="h-16 w-auto object-contain">
        </div>

        <div class="flex items-center space-x-6 text-sm tracking-widest">
            <a href="home.html" class="bg-orange-500 text-white px-4 py-2 rounded">BACK</a>
        </div>
    </nav>

    <!-- Content -->
    <div class="max-w-4xl mx-auto px-6 pt-32 pb-10">
        <div class="bg-white rounded-2xl shadow p-8">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Edit Menu</h2>
            </div>

            <form action="" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Name</label>
                    <input 
                        type="text" 
                        name="name" 
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea 
                        name="description" 
                        rows="4"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400"
                    ></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Price</label>
                        <input 
                            type="number" 
                            name="price" 
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">User ID</label>
                        <input 
                            type="number" 
                            name="userId" 
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Image URL</label>
                    <input 
                        type="text" 
                        name="imgUrl" 
                        placeholder="https://example.com/image.jpg"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                    <select 
                        name="categoryId"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-400">
                        <option value="">Pilih kategori</option>
                        <option value="1">Indonesia Food</option>
                        <option value="2">Thailand Food</option>
                        <option value="3">Vietnamese Food</option>
                        <option value="4">Malaysian Food</option>
                        <option value="5">Singaporean Food</option>
                    </select>
                </div>

                <div class="flex justify-end gap-3 pt-4">
                    <a href="edit.html" class="px-5 py-3 rounded-xl bg-gray-200 text-gray-700 hover:bg-gray-300 transition">Cancel</a>
                    <a href="Home.html" class="px-5 py-3 rounded-xl bg-orange-500 text-white hover:bg-orange-600 transition shadow">Save Data</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
