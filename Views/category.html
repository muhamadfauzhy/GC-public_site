<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Category List</title>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-6 bg-white shadow">
        <h1 class="font-semibold text-sm tracking-widest">CATEGORY LIST</h1>

        <div class="absolute left-1/2 transform -translate-x-1/2">
            <img src="../asset/Logo2.png" class="h-16">
        </div>

        <div class="flex items-center space-x-6 text-sm tracking-widest">
            <a href="home.html" class="bg-orange-500 text-white px-4 py-2 rounded">BACK</a>
        </div>
    </nav>

    <!-- Content -->
    <div class="max-w-4xl mx-auto pt-32 px-6">

        <div class="bg-white rounded-2xl shadow p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Category Data</h2>
                <a href="#" class="bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600">
                    + Add Category
                </a>
            </div>

            <!-- Table -->
            <table class="w-full border border-gray-200 rounded-lg overflow-hidden">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3 text-left">No</th>
                        <th class="p-3 text-left">Category Name</th>
                        <th class="p-3 text-left">Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-3">1</td>
                        <td class="p-3">Indonesian Food</td>
                        <td class="p-3">
                            <button class="text-blue-500 hover:underline">Edit</button>
                            <button class="text-red-500 hover:underline ml-2">Delete</button>
                        </td>
                    </tr>

                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-3">2</td>
                        <td class="p-3">Thai Food</td>
                        <td class="p-3">
                            <button class="text-blue-500 hover:underline">Edit</button>
                            <button class="text-red-500 hover:underline ml-2">Delete</button>
                        </td>
                    </tr>

                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-3">3</td>
                        <td class="p-3">Vietnamese Food</td>
                        <td class="p-3">
                            <button class="text-blue-500 hover:underline">Edit</button>
                            <button class="text-red-500 hover:underline ml-2">Delete</button>
                        </td>
                    </tr>

                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-3">4</td>
                        <td class="p-3">Malaysian Food</td>
                        <td class="p-3">
                            <button class="text-blue-500 hover:underline">Edit</button>
                            <button class="text-red-500 hover:underline ml-2">Delete</button>
                        </td>
                    </tr>

                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-3">5</td>
                        <td class="p-3">Singaporean Food</td>
                        <td class="p-3">
                            <button class="text-blue-500 hover:underline">Edit</button>
                            <button class="text-red-500 hover:underline ml-2">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</body>
</html>
